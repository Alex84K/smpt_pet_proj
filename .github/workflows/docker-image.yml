name: CI/CD & GitOps Pipeline - MailShield

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  packages: write

jobs:
  # ÉТАП 1: Тестирование и линтинг Go кода
  test-and-lint:
    name: Run Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Чекэут кода из Git
        uses: actions/checkout@v4

      - name: Установка Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Кэширование Go модулей
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Проверка форматирования и vet
        run: |
          go fmt ./...
          go vet ./...

      - name: Запуск юнит-тестов
        run: go test -v ./...

  # ÉТАП 2: Сборка и отправка Docker-образа в Docker Registry (GHCR)
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    outputs:
      image_tag: ${{ steps.prep.outputs.sha_tag }}

    steps:
      - name: Чекэут кода
        uses: actions/checkout@v4

      - name: Подготовка переменных
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/${REPO_LOWER}" >> $GITHUB_OUTPUT
          echo "sha_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Авторизация в GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Извлечение метаданных для Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.prep.outputs.sha_tag }}
            type=sha,format=long

      - name: Сборка и публикация Docker-образа
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ÉТАП 3: GitOps — Автоматическое обновление манифестов
  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Чекэут репозитория
        uses: actions/checkout@v4

      - name: Установка Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Обновление тега образа в k8s/kustomization.yaml
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          cd k8s
          kustomize edit set image ghcr.io/alex84k/go_mail_serv=ghcr.io/${REPO_LOWER}:${NEW_TAG}

      - name: Коммит и Push обновленных GitOps манифестов
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "ci(gitops): update mailshield image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git push
          fi