version: '3.8'

services:
  mailshield:
    build: .
    ports:
      - "25:2525"
    restart: always
    env_file: .env          # TG_TOKEN (secret)
    environment:
      - BIND_ADDR=0.0.0.0:2525
      - HOSTNAME=shk.solutions
      - DB_PATH=/app/data/mailshield.db
      - DKIM_KEY_PATH=/app/keys/dkim_private.pem
      - DKIM_SELECTOR=mail
    volumes:
      - ./data:/app/data        # SQLite database (persistent)
      - ./keys:/app/keys:ro     # DKIM private key (read-only)
